<!-- 篩選面板 -->
<aside class="filter-panel">
    <h3 class="filter-title">篩選條件</h3>
    <form method="GET" action="/category" class="filter-form" id="filter-form">
        <!-- 種類篩選 -->
        <fieldset class="filter-group">
            <legend>種類</legend>
            <div class="filter-radios">
                <label><input type="radio" name="instrument" value="ddj" {% if instrument == 'ddj' %}checked{% endif %} /> DJ盤</label>
                <label><input type="radio" name="instrument" value="audio" {% if instrument == 'audio' %}checked{% endif %} /> 音響</label>
                <label><input type="radio" name="instrument" value="wire" {% if instrument == 'wire' %}checked{% endif %} /> 線材</label>
                <label><input type="radio" name="instrument" value="music" {% if instrument == 'music' %}checked{% endif %} /> 音樂</label>
            </div>
        </fieldset>

        <!-- 品牌篩選 -->
        <fieldset class="filter-group">
            <legend>品牌</legend>
            <input type="text" name="brand" placeholder="輸入品牌名稱" value="{{ brand_filter or '' }}" class="filter-input" />
        </fieldset>

        <!-- 價格篩選 -->
        <fieldset class="filter-group">
            <legend>售價範圍</legend>
            <div class="price-range">
                <input type="number" name="price_min" placeholder="最低" value="{{ price_min if price_min > 0 else '' }}" min="0" class="filter-input" />
                <span>—</span>
                <input type="number" name="price_max" placeholder="最高" value="{{ price_max if price_max < 999999 else '' }}" min="0" class="filter-input" />
            </div>
        </fieldset>

        <!-- 按鈕 -->
        <div class="filter-buttons">
            <button type="submit" class="btn btn-secondary">套用篩選</button>
            <a href="/category?instrument={{ instrument }}" class="btn btn-outline">重設篩選</a>
        </div>
    </form>
</aside>
